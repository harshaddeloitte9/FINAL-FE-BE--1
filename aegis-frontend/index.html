<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aegis Credit</title>
    <script>
      // Applied synchronously, before first paint, so there's no flash of
      // the wrong theme. Mirrors src/lib/theme.ts's getPreferredTheme() —
      // stored choice wins, otherwise falls back to the OS preference.
      (function () {
        try {
          var stored = localStorage.getItem("aegis_theme");
          var dark = stored === "dark" || (stored !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
